<!DOCTYPE html>
<html lang="zh-TW" style="overflow-x:hidden">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>新懋宇 報價系統</title>
<meta name="theme-color" content="#0f1520">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="報價系統">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@300;400;500;700;900&family=Noto+Serif+TC:wght@400;700&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#090d13;--s1:#0f1520;--s2:#141d2b;--s3:#1a2536;
  --border:#1f2e42;--border2:#273a52;
  --gold:#c9a84c;--gold2:#e4c96a;--gold-dim:#5e430e;--gold-pale:rgba(201,168,76,.08);
  --cat:#d4724a;--cat2:#e89070;
  --text:#d8e4f0;--dim:#6a82a0;--muted:#2c3f58;
  --green:#4ab870;--red:#d94f4f;--blue:#4f7fe0;--purple:#9b72d4;
  --r:5px;--mono:'Space Mono',monospace;--sans:'Noto Sans TC',sans-serif;--serif:'Noto Serif TC',serif;
}
html,body{height:100%;background:var(--bg);color:var(--text);font-family:var(--sans);font-size:13px;line-height:1.5;overflow:hidden}
::-webkit-scrollbar{width:4px;height:4px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--border2);border-radius:2px}

/* ── SHELL ── */
#shell{display:flex;flex-direction:column;height:100vh}

/* ── TOP BAR ── */
#topbar{display:flex;align-items:center;gap:12px;padding:0 16px;height:46px;background:var(--s1);border-bottom:1px solid var(--border);flex-shrink:0}
.sys-label{font-family:var(--sans);font-size:13px;font-weight:700;color:var(--text);letter-spacing:.5px}
.date-chip{font-family:var(--mono);font-size:11px;color:var(--dim);background:var(--bg);border:1px solid var(--border);padding:3px 10px;border-radius:var(--r);letter-spacing:.5px}
.brand-toggle{display:flex;background:var(--bg);border:1px solid var(--border);border-radius:var(--r);overflow:hidden;margin-left:auto}
.brand-btn{padding:5px 18px;font-family:var(--sans);font-size:12px;font-weight:500;cursor:pointer;border:none;background:transparent;color:var(--dim);transition:all .15s}
.brand-btn.a-smy{background:var(--gold);color:#090d13;font-weight:700}
.brand-btn.a-cat{background:var(--cat);color:#090d13;font-weight:700}

/* ── TABS ── */
#tabs{display:flex;height:36px;background:var(--s1);border-bottom:1px solid var(--border);flex-shrink:0;padding:0 16px;align-items:flex-end}
.tab-btn{padding:0 16px;height:34px;background:transparent;border:none;border-bottom:2px solid transparent;color:var(--dim);font-family:var(--sans);font-size:12px;font-weight:500;cursor:pointer;letter-spacing:.3px;transition:all .15s}
.tab-btn.active{color:var(--gold);border-bottom-color:var(--gold)}
.tab-btn:hover:not(.active){color:var(--text)}
#content{flex:1;overflow:hidden;display:flex}
.tab-panel{display:none;width:100%;height:100%}
.tab-panel.active{display:flex}

/* ── SHARED ── */
.stitle{font-size:9px;font-family:var(--mono);letter-spacing:2px;color:var(--gold);text-transform:uppercase;display:flex;align-items:center;gap:8px;margin-bottom:8px;flex-shrink:0}
.stitle::after{content:'';flex:1;height:1px;background:var(--border)}
.card{background:var(--s2);border:1px solid var(--border);border-radius:var(--r);padding:12px}
select,input[type=number],input[type=text],input[type=date],input[type=password],textarea{
  background:var(--bg);border:1px solid var(--border);color:var(--text);border-radius:var(--r);
  padding:6px 9px;font-family:var(--sans);font-size:12px;outline:none;transition:border-color .15s;width:100%}
select:focus,input:focus,textarea:focus{border-color:var(--gold)}
label{font-size:9px;color:var(--muted);font-family:var(--mono);letter-spacing:1px;text-transform:uppercase;display:block;margin-bottom:3px}
.btn{display:inline-flex;align-items:center;justify-content:center;gap:5px;padding:6px 12px;border:1px solid var(--border);border-radius:var(--r);background:var(--s2);color:var(--text);font-family:var(--sans);font-size:11px;font-weight:500;cursor:pointer;transition:all .15s;white-space:nowrap}
.btn:hover{border-color:var(--gold);color:var(--gold);background:var(--gold-pale)}
.btn:disabled{opacity:.4;cursor:not-allowed;pointer-events:none}
.btn-gold{background:var(--gold);border-color:var(--gold);color:#090d13;font-weight:700}
.btn-gold:hover{background:var(--gold2);border-color:var(--gold2);color:#090d13}
.btn-gold.cat{background:var(--cat);border-color:var(--cat)}
.btn-gold.cat:hover{background:var(--cat2);border-color:var(--cat2);color:#090d13}
.btn-green{border-color:var(--green);color:var(--green)}
.btn-green:hover{background:rgba(74,184,112,.1)}
.btn-danger{border-color:var(--red);color:var(--red)}
.btn-danger:hover{background:rgba(217,79,79,.1)}
.badge{display:inline-flex;align-items:center;padding:1px 6px;border-radius:3px;font-family:var(--mono);font-size:9px;font-weight:700;letter-spacing:.5px}
.bg-gold{background:rgba(201,168,76,.12);color:var(--gold);border:1px solid var(--gold-dim)}
.bg-dim{background:rgba(106,130,160,.08);color:var(--dim);border:1px solid var(--border2)}
.bg-green{background:rgba(74,184,112,.12);color:var(--green);border:1px solid rgba(74,184,112,.3)}
.bg-blue{background:rgba(79,127,224,.12);color:var(--blue);border:1px solid rgba(79,127,224,.3)}
.divider{border:none;border-top:1px solid var(--border);margin:10px 0}

/* ════════════════════════════
   TAB 1 — QUOTE BUILDER
════════════════════════════ */
#tab-quote{display:none}
#tab-quote.active{display:grid;grid-template-columns:420px 1fr;grid-template-rows:1fr 52px;height:100%}
.qleft{grid-row:1/2;overflow-y:auto;padding:14px;display:flex;flex-direction:column;gap:12px;border-right:1px solid var(--border);background:var(--s1)}
.qright{grid-row:1/2;overflow-y:auto;padding:24px 28px;background:#1a2030;display:flex;flex-direction:column;align-items:center}
.qbar{grid-column:1/-1;grid-row:2/3;display:flex;align-items:center;gap:8px;padding:0 14px;background:var(--s1);border-top:1px solid var(--border)}

/* category tabs */
.cat-tabs{display:flex;gap:3px;flex-wrap:wrap}
.ctab{padding:3px 8px;border-radius:3px;border:1px solid var(--border);background:transparent;color:var(--dim);font-size:11px;cursor:pointer;transition:all .13s}
.ctab.on{background:var(--gold);border-color:var(--gold);color:#090d13;font-weight:700}
.ctab.on.cat{background:var(--cat);border-color:var(--cat)}

/* product list */
.prod-list{max-height:150px;overflow-y:auto;border:1px solid var(--border);border-radius:var(--r);background:var(--bg)}
.pitem{display:flex;align-items:center;gap:8px;padding:6px 10px;cursor:pointer;transition:background .1s;border-bottom:1px solid var(--border)}
.pitem:last-child{border-bottom:none}
.pitem:hover,.pitem.sel{background:var(--s3)}
.pname{flex:1;font-size:12px}
.punit{font-size:10px;color:var(--muted)}
.pprice{font-family:var(--mono);font-size:11px;font-weight:700;color:var(--gold)}
.pprice.cat{color:var(--cat)}
.pprice.mkt{color:var(--dim);font-style:italic}
.pstale{font-size:9px;color:var(--muted)}

/* price mode toggle */
.price-mode-bar{display:flex;gap:0;border:1px solid var(--border);border-radius:var(--r);overflow:hidden;background:var(--bg)}
.pm-btn{flex:1;padding:6px 4px;border:none;background:transparent;color:var(--dim);font-family:var(--sans);font-size:11px;font-weight:500;cursor:pointer;transition:all .15s;text-align:center;border-right:1px solid var(--border)}
.pm-btn:last-child{border-right:none}
.pm-btn.on-orig{background:var(--s3);color:var(--text)}
.pm-btn.on-biz{background:rgba(74,184,112,.15);color:var(--green);font-weight:700}
.pm-btn.on-retail{background:rgba(155,114,212,.15);color:var(--purple);font-weight:700}
.pm-label{display:flex;align-items:center;justify-content:space-between;margin-bottom:6px}
.pm-desc{font-size:10px;color:var(--dim);font-family:var(--mono);letter-spacing:.3px}

/* quote items */
.irow{display:flex;align-items:center;gap:6px;padding:7px 9px;background:var(--bg);border:1px solid var(--border);border-radius:var(--r);animation:si .15s ease;transition:border-color .15s,opacity .15s}
.irow.drag-over{border-color:var(--gold);background:var(--gold-pale)}
.irow.dragging{opacity:.4}
.drag-handle{cursor:grab;color:var(--muted);font-size:14px;flex-shrink:0;padding:0 2px;user-select:none;line-height:1}
.drag-handle:hover{color:var(--dim)}
.drag-handle:active{cursor:grabbing}
.move-btns{display:flex;flex-direction:column;gap:1px;flex-shrink:0}
.move-btn{background:none;border:none;color:var(--muted);cursor:pointer;font-size:9px;padding:0 3px;line-height:1.2;transition:color .13s}
.move-btn:hover{color:var(--gold)}
.move-btn:disabled{opacity:.2;cursor:default}
@keyframes si{from{opacity:0;transform:translateX(-5px)}to{opacity:1;transform:translateX(0)}}
.iname{flex:1;font-size:12px;font-weight:500}
.idetail{font-family:var(--mono);font-size:10px;color:var(--dim);white-space:nowrap}
.itotal{font-family:var(--mono);font-size:12px;font-weight:700;min-width:64px;text-align:right;white-space:nowrap}
.itotal.smy{color:var(--gold)}
.itotal.cat{color:var(--cat)}
.itotal.biz{color:var(--green)}
.itotal.retail{color:var(--purple)}
.brm{background:none;border:1px solid var(--muted);border-radius:3px;color:var(--muted);cursor:pointer;font-size:11px;padding:2px 5px;transition:all .13s;line-height:1;flex-shrink:0}
.brm:hover{border-color:var(--red);color:var(--red);background:rgba(217,79,79,.1)}

/* ── PREMIUM QUOTE CARD (白底印刷質感) ── */
.plabel{font-size:9px;font-family:var(--mono);letter-spacing:3px;color:var(--muted);text-transform:uppercase;margin-bottom:16px;align-self:flex-start}
#quote-card{
  width:100%;max-width:460px;
  background:#ffffff;
  border-radius:6px;
  overflow:visible;
  box-shadow:0 4px 32px rgba(0,0,0,.35),0 1px 4px rgba(0,0,0,.2);
}
/* 頂部色條 */
.qc-stripe{height:3px;border-radius:6px 6px 0 0}
.qc-stripe.smy{background:linear-gradient(90deg,#b8943c,#e4c96a 50%,#b8943c)}
.qc-stripe.cat{background:linear-gradient(90deg,#b85c36,#e89070 50%,#b85c36)}

/* 頭部 */
.qc-head{padding:18px 22px 14px;border-bottom:1px solid #ede8e0}
.qc-company{font-family:var(--serif);font-size:17px;font-weight:700;letter-spacing:.5px;color:#1a1714}
.qc-date-row{display:flex;justify-content:space-between;align-items:center;margin-top:7px}
.qc-datenum{font-family:var(--sans);font-size:11px;color:#a09880}
.qc-modetag{font-size:10px;font-weight:700;font-family:var(--mono);padding:2px 8px;border-radius:3px;letter-spacing:.5px}
.qc-modetag.orig{color:#a09880}
.qc-modetag.biz{color:#2d7a4a;background:rgba(45,122,74,.1);border:1px solid rgba(45,122,74,.25)}
.qc-modetag.retail{color:#6b42b8;background:rgba(107,66,184,.1);border:1px solid rgba(107,66,184,.2)}

/* 品項內容 */
.qc-body{padding:16px 22px 4px}
.qc-empty{text-align:center;padding:28px 0;color:#c0b8aa}
.qc-empty-ico{font-size:30px;opacity:.4;display:block;margin-bottom:8px}
.qc-section{margin-bottom:14px}
.qc-cat{
  font-size:9px;font-family:var(--mono);letter-spacing:2.5px;
  color:#a09880;text-transform:uppercase;
  margin-bottom:7px;border-bottom:1px solid #ede8e0;padding-bottom:4px;
}
.qc-irow{display:grid;grid-template-columns:1fr auto auto;align-items:baseline;gap:12px;padding:5px 0;border-bottom:1px solid #f2ede7}
.qc-irow:last-child{border-bottom:none}
.qc-iname{font-size:17px;color:#1a1714;line-height:1.3}
.qc-iref{font-size:11px;color:#b0a090;display:inline;margin-left:8px;font-weight:400}
.qc-icalc{font-family:var(--sans);font-size:10px;color:#b0a090;text-align:right;white-space:nowrap}
.qc-iamt{font-family:var(--sans);font-size:13px;font-weight:700;text-align:right;white-space:nowrap}
.qc-iamt.smy{color:#8a6820}
.qc-iamt.cat{color:#9a4828}
.qc-iamt.biz{color:#2d7a4a}
.qc-iamt.retail{color:#6b42b8}

/* 合計 */
.qc-total{display:flex;justify-content:space-between;align-items:baseline;padding:12px 0 8px;border-top:1px solid #ddd8ce;margin-top:4px}
.qc-total-lbl{font-size:11px;color:#888070;letter-spacing:.5px}
.qc-total-amt{font-family:var(--sans);font-size:24px;font-weight:700}
.qc-total-amt.smy{color:#8a6820}
.qc-total-amt.cat{color:#9a4828}
.qc-total-amt.biz{color:#2d7a4a}
.qc-total-amt.retail{color:#6b42b8}

/* 使用者備註 */
.qc-usernote{margin:0 22px 14px;padding:9px 12px;background:#faf7f2;border-radius:4px;border-left:2px solid #c9a84c;font-size:11px;color:#665540;line-height:1.65;white-space:pre-wrap}
.qc-usernote.cat{border-left-color:#c06040}

/* 標準注意事項 */
.qc-notes-section{padding:0 22px 16px}
.qc-notes-divider{border:none;border-top:1px solid #ede8e0;margin:0 0 12px}
.qc-notes-title{font-size:9px;font-family:var(--mono);letter-spacing:2px;color:#b0a090;text-transform:uppercase;margin-bottom:10px}
.qc-notes-list{display:flex;flex-direction:column;gap:6px}
.qc-note-item{display:flex;gap:7px;font-size:10.5px;color:#988878;line-height:1.55}
.qc-note-mark{color:#c9a84c;flex-shrink:0;font-size:11px;margin-top:1px}
.qc-note-mark.cat{color:#c06040}

/* 頁腳 */
.qc-foot{padding:14px 22px 18px;background:#f5f1eb;border-top:1px solid #e0d8cc;border-radius:0 0 6px 6px}
.qc-foot-grid{display:grid;grid-template-columns:1fr 1fr;gap:18px}
.qc-foot-label{font-size:8px;font-family:var(--mono);letter-spacing:2px;color:#b0a090;text-transform:uppercase;margin-bottom:7px}
.qc-acct{font-family:var(--sans);font-size:15px;font-weight:700;letter-spacing:1px;display:block;margin-bottom:4px}
.qc-acct.smy{color:#8a6820}
.qc-acct.cat{color:#9a4828}
.qc-bank{font-size:11px;color:#887868;font-family:var(--sans);margin-bottom:2px}
.qc-addr{font-size:11px;color:#887868;line-height:1.65}
.qc-lineid{font-family:var(--sans);font-size:12px;margin-top:5px;font-weight:700}
.qc-lineid.smy{color:#8a6820}
.qc-lineid.cat{color:#9a4828}

/* quote bar */
.qbar-total{flex:1;font-family:var(--mono);font-size:11px;color:var(--dim)}
.qbar-total span{font-size:16px;font-weight:700;margin-left:5px}
.qbar-total span.smy{color:var(--gold)}
.qbar-total span.cat{color:var(--cat)}
.qbar-total span.biz{color:var(--green)}
.qbar-total span.retail{color:var(--purple)}

/* ════════════════════════════
   TAB 2 — 商品資料庫
════════════════════════════ */
#tab-db{display:none}
#tab-db.active{display:flex;flex-direction:column;height:100%}
.dbtoolbar{display:flex;align-items:center;gap:8px;padding:8px 14px;background:var(--s1);border-bottom:1px solid var(--border);flex-shrink:0;flex-wrap:wrap}
.dbsearch{max-width:200px}
.dbcatsel{max-width:150px}
.dbstats{margin-left:auto;font-family:var(--mono);font-size:10px;color:var(--muted)}
.dbtablewrap{flex:1;overflow:auto}
table{width:100%;border-collapse:collapse}
thead tr{background:var(--s2);position:sticky;top:0;z-index:5}
th{padding:7px 12px;text-align:left;font-size:9px;font-family:var(--mono);letter-spacing:1.5px;color:var(--muted);text-transform:uppercase;border-bottom:1px solid var(--border);white-space:nowrap}
td{padding:6px 12px;border-bottom:1px solid var(--border);font-size:12px;vertical-align:middle}
tr:hover td{background:var(--s2)}
.tdprice{font-family:var(--mono);font-weight:700;color:var(--gold)}
.tdprice.cat{color:var(--cat)}
.tdprice.mkt{color:var(--dim);font-style:italic}
.tddate{font-family:var(--mono);font-size:10px;color:var(--muted)}
.pchange{font-family:var(--mono);font-size:9px;margin-left:3px}
.pup{color:#d94f4f}.pdn{color:#4ab870}
.histbtn{background:none;border:1px solid var(--border);color:var(--muted);padding:2px 7px;border-radius:3px;font-size:9px;cursor:pointer;font-family:var(--mono);transition:all .13s}
.histbtn:hover{border-color:var(--gold);color:var(--gold)}

/* history modal */
#hmodal{display:none;position:fixed;inset:0;background:rgba(0,0,0,.75);z-index:100;align-items:center;justify-content:center}
#hmodal.on{display:flex}
.hbox{background:var(--s1);border:1px solid var(--border2);border-radius:8px;min-width:320px;max-width:460px;max-height:80vh;overflow-y:auto}
.hhd{display:flex;align-items:center;justify-content:space-between;padding:12px 16px;border-bottom:1px solid var(--border)}
.hclose{background:none;border:none;color:var(--dim);font-size:18px;cursor:pointer}
.hbody{padding:14px 16px}
.hentry{display:flex;align-items:center;gap:10px;padding:5px 0;border-bottom:1px dotted var(--border)}
.hentry:last-child{border-bottom:none}
.hdate{font-family:var(--mono);font-size:10px;color:var(--muted);min-width:76px}
.hprice{font-family:var(--mono);font-size:14px;font-weight:700;color:var(--gold)}
.hnote{font-size:10px;color:var(--muted)}

/* ════════════════════════════
   TAB 3 — 匯入報價單
════════════════════════════ */
#tab-import{display:none}
#tab-import.active{display:grid;grid-template-columns:1fr 1fr;height:100%}
.imgleft{overflow-y:auto;padding:16px;display:flex;flex-direction:column;gap:14px;border-right:1px solid var(--border);background:var(--s1)}
.imgright{overflow-y:auto;padding:16px;background:var(--bg)}
.upload-zone{border:2px dashed var(--border2);border-radius:8px;padding:28px 20px;text-align:center;cursor:pointer;transition:all .2s;background:var(--bg);position:relative}
.upload-zone:hover,.upload-zone.drag{border-color:var(--gold);background:var(--gold-pale)}
.upload-zone input[type=file]{position:absolute;inset:0;opacity:0;cursor:pointer;font-size:0}
.upload-ico{font-size:32px;margin-bottom:8px;opacity:.5}
.upload-txt{font-size:13px;color:var(--dim);margin-bottom:3px}
.upload-sub{font-size:10px;color:var(--muted)}
.ai-status{padding:10px 12px;border-radius:var(--r);font-size:12px;display:none}
.ai-status.on{display:flex;align-items:center;gap:8px}
.ai-status.loading{background:rgba(79,127,224,.1);border:1px solid rgba(79,127,224,.3);color:var(--blue)}
.ai-status.ok{background:rgba(74,184,112,.1);border:1px solid rgba(74,184,112,.3);color:var(--green)}
.ai-status.err{background:rgba(217,79,79,.1);border:1px solid rgba(217,79,79,.3);color:var(--red)}
.spinner{width:14px;height:14px;border:2px solid rgba(79,127,224,.3);border-top-color:var(--blue);border-radius:50%;animation:spin .7s linear infinite;flex-shrink:0}
@keyframes spin{to{transform:rotate(360deg)}}
.apikey-row{display:flex;align-items:flex-end;gap:6px}
.apikey-row input{font-family:var(--mono);font-size:11px;letter-spacing:.5px}
.presult{display:flex;flex-direction:column;gap:3px;max-height:260px;overflow-y:auto}
.prow{display:flex;align-items:center;gap:7px;padding:4px 7px;background:var(--s2);border:1px solid var(--border);border-radius:3px;font-size:11px}
.prow.new{border-color:rgba(74,184,112,.4);background:rgba(74,184,112,.04)}
.prow.update{border-color:rgba(79,127,224,.4);background:rgba(79,127,224,.04)}
.prow.skip{opacity:.45}
.ptag{font-size:8px;font-family:var(--mono);padding:1px 5px;border-radius:2px;font-weight:700;flex-shrink:0}
.ptag.new{background:rgba(74,184,112,.2);color:var(--green)}
.ptag.update{background:rgba(79,127,224,.2);color:var(--blue)}
.ptag.skip{background:rgba(106,130,160,.15);color:var(--dim)}
.pn{flex:1;font-weight:500}
.pp{font-family:var(--mono);font-weight:700;color:var(--gold);font-size:11px}
.implog{display:flex;flex-direction:column;gap:3px;max-height:200px;overflow-y:auto}
.logrec{display:flex;gap:8px;padding:4px 8px;background:var(--s2);border-radius:3px;align-items:center;font-size:11px}
.logdt{font-family:var(--mono);font-size:10px;color:var(--muted);flex-shrink:0}
.logmsg{flex:1;color:var(--dim)}
.img-preview{width:100%;border-radius:6px;border:1px solid var(--border);margin-top:8px;display:none}
.img-preview.on{display:block}

/* ── EDIT MODAL ── */
#edit-modal{display:none;position:fixed;inset:0;background:rgba(0,0,0,.78);z-index:200;align-items:center;justify-content:center}
#edit-modal.on{display:flex}
.ebox{background:var(--s1);border:1px solid var(--border2);border-radius:8px;width:420px;max-height:92vh;overflow-y:auto;box-shadow:0 20px 60px rgba(0,0,0,.5)}
.ebhd{display:flex;align-items:center;justify-content:space-between;padding:14px 18px;border-bottom:1px solid var(--border);font-weight:700;font-size:14px}
.ebody{padding:16px 18px;display:flex;flex-direction:column;gap:11px}
.efoot{display:flex;gap:8px;padding:12px 18px;border-top:1px solid var(--border)}
.efield{display:flex;flex-direction:column;gap:4px}
.efield label{font-size:9px;color:var(--muted);font-family:var(--mono);letter-spacing:1px;text-transform:uppercase}
.efield input,.efield select,.efield textarea{background:var(--bg);border:1px solid var(--border);color:var(--text);border-radius:var(--r);padding:7px 10px;font-family:var(--sans);font-size:12px;outline:none;transition:border-color .15s;width:100%}
.efield input:focus,.efield select:focus,.efield textarea:focus{border-color:var(--gold)}
.egrid2{display:grid;grid-template-columns:1fr 1fr;gap:10px}

/* ── TOAST ── */
#toast{position:fixed;bottom:64px;left:50%;transform:translateX(-50%) translateY(10px);background:var(--s1);border:1px solid var(--gold);color:var(--gold);font-family:var(--mono);font-size:11px;letter-spacing:.5px;padding:5px 18px;border-radius:999px;opacity:0;transition:all .22s;pointer-events:none;z-index:300}
#toast.on{opacity:1;transform:translateX(-50%) translateY(0)}

/* ════════════════════════════════════════
   MOBILE  ≤ 768px
════════════════════════════════════════ */
@media(max-width:768px){
  html,body{overflow:auto;height:auto}

  #topbar>div[id="arrival-wrapper"]{display:none!important}
  .brand-toggle{margin-left:auto}
  #tabs{padding:0 8px;height:40px;overflow-x:auto;-webkit-overflow-scrolling:touch;flex-shrink:0;position:sticky;top:48px;z-index:40;background:var(--s1)}
  .tab-btn{padding:0 12px;font-size:12px;white-space:nowrap}
  #content{overflow:visible;flex:1}

  #tab-quote.active{display:block!important;height:auto!important}
  .qleft{display:flex;flex-direction:column;gap:12px;padding:12px;padding-bottom:16px;overflow:visible;border-right:none;background:var(--s1);width:100%;box-sizing:border-box;max-width:100vw}
  .qright,.qbar{display:none!important}
  /* Mobile customer block */
  #mob-cust-block{background:var(--s2);border:1px solid var(--border);border-radius:var(--r);padding:12px;flex-direction:column;gap:0;width:100%;box-sizing:border-box}
  .mf{display:flex;flex-direction:column;gap:3px;padding:6px 0;border-bottom:1px solid var(--border)}
  .mf:last-child{border-bottom:none}
  .mflbl{font-size:9px;color:var(--muted);font-family:var(--mono);letter-spacing:1px;text-transform:uppercase;display:block}
  .mf input{display:block;width:100%;background:var(--bg);border:1px solid var(--border);color:var(--text);border-radius:4px;padding:8px 10px;font-family:var(--sans);outline:none;box-sizing:border-box}
  .mf input:focus{border-color:var(--gold)}
  #mob-arr-chip{display:flex;align-items:center;gap:6px;width:100%;background:var(--bg);border:1px solid var(--border);border-radius:4px;padding:8px 10px;cursor:pointer;box-sizing:border-box}
  #mob-arr-chip span:first-child{flex:1;font-size:13px;color:var(--dim);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  /* Calendar: centered modal on mobile */
  #cal-popover{position:fixed!important;top:50%!important;left:50%!important;right:auto!important;transform:translate(-50%,-50%)!important;max-width:calc(100vw - 32px)!important;z-index:600!important}
  /* Prevent iOS input zoom */
  select,input,textarea{font-size:16px!important;box-sizing:border-box;max-width:100%}
  /* Form rows wrap on small screens */
  .card>div[style*="display:flex;gap:7px"]{flex-wrap:wrap}
  [style*="width:80px"],[style*="width:86px"],[style*="width:72px"],[style*="width:68px"]{
    min-width:0;flex:1 1 60px;
  }
  #qprodsel{padding:9px}
  /* General width constraints */
  .card,.irow,.prod-list,.price-mode-bar{width:100%;box-sizing:border-box;max-width:100%}
  .cat-tabs{flex-wrap:wrap}
  /* Items */
  .irow{padding:8px;min-width:0}
  .idetail{font-size:10px;white-space:normal;word-break:break-word;flex:1;min-width:0;overflow-wrap:anywhere}
  .iname{min-width:0;overflow:hidden;text-overflow:ellipsis;max-width:120px}
  /* Preview FAB */
  #mob-fab{position:fixed;bottom:calc(16px + env(safe-area-inset-bottom));right:16px;z-index:200;display:none;align-items:center;gap:6px;background:var(--gold);color:#090d13;border:none;border-radius:999px;padding:13px 22px;font-size:14px;font-weight:700;font-family:var(--sans);cursor:pointer;box-shadow:0 4px 24px rgba(201,168,76,.45)}
  /* Preview overlay */
  #mob-ov{display:none;position:fixed;inset:0;z-index:300;background:var(--bg);flex-direction:column;overflow-y:auto;-webkit-overflow-scrolling:touch}
  #mob-ov.on{display:flex}
  .mob-ov-hd{position:sticky;top:0;z-index:10;display:flex;align-items:center;justify-content:space-between;padding:10px 14px;padding-top:max(10px,env(safe-area-inset-top));background:var(--s1);border-bottom:1px solid var(--border)}
  .mob-ov-hd strong{font-size:14px}
  .mob-ov-hd button{background:none;border:1px solid var(--border);color:var(--dim);border-radius:4px;padding:5px 14px;font-size:12px;cursor:pointer}
  #mob-card-wrap{flex:1;padding:14px 12px;padding-bottom:calc(80px + env(safe-area-inset-bottom));display:flex;justify-content:center;align-items:flex-start}
  #mob-card-wrap>div{width:100%;max-width:460px}
  .mob-ov-bar{position:sticky;bottom:0;display:flex;gap:6px;padding:10px 12px;padding-bottom:max(10px,env(safe-area-inset-bottom));background:var(--s1);border-top:1px solid var(--border)}
  /* Tab 2 DB */
  #tab-db.active{display:flex;flex-direction:column;height:auto;min-height:60vh}
  .dbtoolbar{flex-wrap:wrap;gap:6px;padding:8px 10px}
  .dbtablewrap{overflow-x:auto;-webkit-overflow-scrolling:touch}
  table{min-width:560px}
  th,td{padding:5px 7px;font-size:11px}
  /* Tab 3 Import */
  #tab-import.active{display:flex!important;flex-direction:column;height:auto}
  .imgleft{border-right:none;border-bottom:1px solid var(--border)}
  /* Touch */
  .btn{min-height:38px}
  .ctab{padding:5px 10px}
}

  /* Mobile preview toggle button */
  #mob-preview-toggle-wrap{display:none}
  #mob-preview-section{display:none}
  @media(max-width:768px){
    #mob-preview-toggle-wrap{display:block!important}
    #mob-preview-section{width:100%;box-sizing:border-box}
    #mob-preview-section #quote-card,
    #mob-quote-card-inner>div{width:100%!important;max-width:100%!important}
    /* Topbar on mobile */
    #topbar{overflow:hidden}
    /* Shell full width */
    #shell,#content,.qleft,.card{width:100%;max-width:100%;overflow-x:hidden;box-sizing:border-box}
  }

</style>
</head>
<body style="overflow-x:hidden">
<div id="shell">

<!-- TOP BAR -->
<div id="topbar">
  <div class="sys-label">報價系統</div>
  <div class="date-chip" id="tdchip"></div>
  <div id="arrival-wrapper" style="position:relative;margin-left:auto">
    <div id="arrival-chip" onclick="toggleCalendar()" style="display:flex;align-items:center;gap:7px;background:var(--bg);border:1px solid var(--border);border-radius:var(--r);padding:4px 12px;cursor:pointer;transition:border-color .15s;min-width:190px" onmouseover="this.style.borderColor='var(--gold)'" onmouseout="this.style.borderColor='var(--border)'">
      <span style="font-size:9px;color:var(--muted);font-family:var(--mono);letter-spacing:1px;text-transform:uppercase;flex-shrink:0">到貨</span>
      <span id="arrival-display" style="font-size:12px;color:var(--dim);flex:1">希望到貨日　點擊選擇</span>
      <span style="font-size:10px;color:var(--muted)">▾</span>
    </div>
    <!-- Calendar Popover -->
    <div id="cal-popover" style="display:none;position:absolute;top:calc(100% + 6px);right:0;z-index:500;background:var(--s1);border:1px solid var(--border2);border-radius:8px;box-shadow:0 12px 40px rgba(0,0,0,.6);min-width:280px;overflow:hidden">
      <!-- Month nav -->
      <div style="display:flex;align-items:center;justify-content:space-between;padding:10px 14px 8px;border-bottom:1px solid var(--border)">
        <button onclick="calPrevMonth()" style="background:none;border:1px solid var(--border);color:var(--dim);border-radius:4px;padding:3px 9px;cursor:pointer;font-size:14px;transition:all .13s" onmouseover="this.style.borderColor='var(--gold)';this.style.color='var(--gold)'" onmouseout="this.style.borderColor='var(--border)';this.style.color='var(--dim)'">‹</button>
        <span id="cal-month-label" style="font-size:13px;font-weight:600;letter-spacing:.5px"></span>
        <button onclick="calNextMonth()" style="background:none;border:1px solid var(--border);color:var(--dim);border-radius:4px;padding:3px 9px;cursor:pointer;font-size:14px;transition:all .13s" onmouseover="this.style.borderColor='var(--gold)';this.style.color='var(--gold)'" onmouseout="this.style.borderColor='var(--border)';this.style.color='var(--dim)'">›</button>
      </div>
      <!-- Weekday headers -->
      <div style="display:grid;grid-template-columns:repeat(7,1fr);gap:2px;padding:8px 10px 4px;text-align:center">
        <div style="font-size:9px;color:var(--red);font-family:var(--mono);font-weight:700">日</div>
        <div style="font-size:9px;color:var(--muted);font-family:var(--mono);font-weight:700">一</div>
        <div style="font-size:9px;color:var(--muted);font-family:var(--mono);font-weight:700">二</div>
        <div style="font-size:9px;color:var(--muted);font-family:var(--mono);font-weight:700">三</div>
        <div style="font-size:9px;color:var(--muted);font-family:var(--mono);font-weight:700">四</div>
        <div style="font-size:9px;color:var(--muted);font-family:var(--mono);font-weight:700">五</div>
        <div style="font-size:9px;color:var(--blue);font-family:var(--mono);font-weight:700">六</div>
      </div>
      <!-- Days grid -->
      <div id="cal-days" style="display:grid;grid-template-columns:repeat(7,1fr);gap:3px;padding:0 10px 10px"></div>
      <!-- Time select -->
      <div style="border-top:1px solid var(--border);padding:10px 14px;display:flex;align-items:center;gap:8px">
        <span style="font-size:10px;color:var(--muted);font-family:var(--mono);white-space:nowrap">到貨時間</span>
        <select id="cal-time" style="flex:1;font-size:12px;background:var(--bg);border:1px solid var(--border);color:var(--text);border-radius:4px;padding:4px 7px">
          <option value="">不指定</option>
          <option value="早上 9:00">早上 9:00</option>
          <option value="約 10:00">約 10:00</option>
          <option value="約 11:00">約 11:00</option>
          <option value="約 12:00">約 12:00</option>
          <option value="約 13:00">約 13:00</option>
          <option value="約 14:00">約 14:00</option>
          <option value="約 15:00">約 15:00</option>
          <option value="約 16:00">約 16:00</option>
          <option value="約 17:00">約 17:00</option>
          <option value="晚上 18:00">晚上 18:00</option>
          <option value="晚上 19:00">晚上 19:00</option>
          <option value="晚上 20:00">晚上 20:00</option>
        </select>
        <button onclick="confirmArrival()" style="background:var(--gold);border:none;color:#090d13;font-weight:700;font-family:var(--sans);font-size:12px;padding:5px 14px;border-radius:4px;cursor:pointer">確認</button>
      </div>
      <!-- Clear -->
      <div style="padding:0 14px 10px;text-align:right">
        <button onclick="clearArrival()" style="background:none;border:none;color:var(--muted);font-size:10px;cursor:pointer;font-family:var(--mono)">清除到貨日</button>
      </div>
    </div>
  </div>
  <div style="display:flex;align-items:center;gap:8px">
    <!-- 客戶名稱 -->
    <div style="display:flex;align-items:center;gap:5px;background:var(--bg);border:1px solid var(--border);border-radius:var(--r);padding:3px 10px">
      <span style="font-size:9px;color:var(--muted);font-family:var(--mono);letter-spacing:1px;text-transform:uppercase;flex-shrink:0">客戶</span>
      <input type="text" id="customer-name" placeholder="名稱" oninput="renderQPreview()"
        style="background:transparent;border:none;font-size:12px;color:var(--text);padding:0;font-family:var(--sans);outline:none;width:90px">
    </div>
    <!-- 統一編號 -->
    <div style="display:flex;align-items:center;gap:5px;background:var(--bg);border:1px solid var(--border);border-radius:var(--r);padding:3px 10px">
      <span style="font-size:9px;color:var(--muted);font-family:var(--mono);letter-spacing:1px;text-transform:uppercase;flex-shrink:0">統編</span>
      <input type="text" id="customer-tax-id" placeholder="統一編號" oninput="renderQPreview()"
        style="background:transparent;border:none;font-size:12px;color:var(--text);padding:0;font-family:var(--mono);outline:none;width:80px;letter-spacing:1px">
    </div>
    <!-- 聯絡電話 -->
    <div style="display:flex;align-items:center;gap:5px;background:var(--bg);border:1px solid var(--border);border-radius:var(--r);padding:3px 10px">
      <span style="font-size:9px;color:var(--muted);font-family:var(--mono);letter-spacing:1px;text-transform:uppercase;flex-shrink:0">電話</span>
      <input type="text" id="customer-phone" placeholder="聯絡電話" oninput="renderQPreview()"
        style="background:transparent;border:none;font-size:12px;color:var(--text);padding:0;font-family:var(--mono);outline:none;width:110px;letter-spacing:.5px">
    </div>
    <!-- 收件地址 -->
    <div style="display:flex;align-items:center;gap:5px;background:var(--bg);border:1px solid var(--border);border-radius:var(--r);padding:3px 10px">
      <span style="font-size:9px;color:var(--muted);font-family:var(--mono);letter-spacing:1px;text-transform:uppercase;flex-shrink:0">地址</span>
      <input type="text" id="customer-addr" placeholder="收件地址" oninput="renderQPreview()"
        style="background:transparent;border:none;font-size:12px;color:var(--text);padding:0;font-family:var(--sans);outline:none;width:180px">
    </div>
  </div>
  <div class="brand-toggle">
    <button class="brand-btn a-smy" id="b-smy" onclick="setBrand('新懋宇')">新懋宇</button>
    <button class="brand-btn" id="b-cat" onclick="setBrand('貓社長')">貓社長</button>
  </div>
</div>

<!-- TABS -->

</div>

    <!-- 手機客戶資料 -->

// ── PRICE MODE CALCS ─────────────────────────────────────────
// 業務價：×1.05，小數點第一位四捨五入（= Math.round）
function calcBiz(p){return Math.round(p*1.05);}
// 零售含稅：×1.15×1.05，四捨五入到整數，再個位數 0-4→捨、5-9→進
function calcRetail(p){
  const raw=Math.round(p*1.15*1.05);
  const units=raw%10;
  return units<=4 ? raw-units : raw-units+10;
}
function applyMode(basePrice){
  if(basePrice==null)return null;
  if(priceMode==='biz')return calcBiz(basePrice);
  if(priceMode==='retail')return calcRetail(basePrice);
  return basePrice;
}
function modeClass(){
  if(priceMode==='biz')return 'biz';
  if(priceMode==='retail')return 'retail';
  return BRANDS[brand].acc;
}

let dragSrcId=null;
function dragStart(e,id){
  dragSrcId=id;
  e.currentTarget.classList.add('dragging');
  e.dataTransfer.effectAllowed='move';
}
function dragOver(e){
  e.preventDefault();
  e.dataTransfer.dropEffect='move';
  e.currentTarget.classList.add('drag-over');
}
function dragLeave(e){ e.currentTarget.classList.remove('drag-over'); }
function dragEnd(e){ e.currentTarget.classList.remove('dragging'); }
function dragDrop(e,targetId){
  e.preventDefault();
  e.currentTarget.classList.remove('drag-over');
  if(dragSrcId===null||dragSrcId===targetId)return;
  const srcIdx=qItems.findIndex(i=>i.id===dragSrcId);
  const tgtIdx=qItems.findIndex(i=>i.id===targetId);
  if(srcIdx===-1||tgtIdx===-1)return;
  const [item]=qItems.splice(srcIdx,1);
  qItems.splice(tgtIdx,0,item);
  dragSrcId=null;
  renderQItems(); renderQPreview();
}

function getShippingState(){
  // returns: 'free' (≥6000), 'added' (checked), 'unchecked'
  const itemsTotal = qItems.reduce((s,i)=>{ const sub=getItemDisplaySub(i); return s+(sub||0); },0);
  const el = document.getElementById('add-shipping');
  const lbl = document.getElementById('shipping-label');
  const st = document.getElementById('shipping-status');
  if(itemsTotal>=6000){
    if(el){ el.checked=false; el.disabled=true; }
    if(lbl){ lbl.style.opacity='0.45'; lbl.style.cursor='default'; }
    if(st){ st.textContent='總金額滿6000免運費'; st.style.color='var(--green)'; }
    return 'free';
  } else {
    if(el){ el.disabled=false; }
    if(lbl){ lbl.style.opacity='1'; lbl.style.cursor='pointer'; }
    if(st){ st.textContent=''; }
    return el&&el.checked ? 'added' : 'unchecked';
  }
}

function getItemDisplaySub(item){
  const unitPrice=applyMode(item.basePrice);
  if(unitPrice==null)return null;
  // qty × weightPerUnit × price/kg, or qty × price if no weight
  const raw = (item.weightPerUnit&&item.weightPerUnit>0)
    ? unitPrice * item.qty * item.weightPerUnit
    : unitPrice * item.qty;
  if(priceMode==='retail'){
    const floored=Math.round(raw);
    const units=floored%10;
    return units<=4?floored-units:floored-units+10;
  }
  return Math.round(raw);
}

// ── COPY TEXT ────────────────────────────────────────────────
function getQText(){
  const B=BRANDS[brand];
  const note=(document.getElementById('qnote')||{}).value||'';
  const customerTxt=(document.getElementById('customer-name')||{}).value||'';
  const taxIdTxt=(document.getElementById('customer-tax-id')||{}).value||'';
  const phoneTxt=(document.getElementById('customer-phone')||{}).value||'';
  const addrTxt=(document.getElementById('customer-addr')||{}).value||'';
  const arrivalTxt=window._arrivalText||'';

  let t='';

  // 品牌
  t+=`「${brand}」\n`;

  // 希望到貨日
  if(arrivalTxt) t+=`希望到貨日 ${arrivalTxt}\n`;

  // 收件人資訊
  if(customerTxt) t+=`收件人：${customerTxt}\n`;
  if(taxIdTxt) t+=`統一編號：${taxIdTxt}\n`;
  if(phoneTxt) t+=`電話：${phoneTxt}\n`;
  if(addrTxt) t+=`收件地址：${addrTxt}\n`;

  t+='\n';

  // 訂購商品
  t+=`訂購商品：\n\n`;
  let total=0;
  qItems.forEach(i=>{
    const sub=getItemDisplaySub(i);
    if(sub!=null)total+=sub;
    const wtPart=(i.weightPerUnit&&i.weightPerUnit>0)?` ${i.weightPerUnit}kg`:'';
    const qtyPart=`${i.qty}${i.unit}${wtPart}`;
    const amtStr=sub!=null?sub.toLocaleString():'時價';
    if(priceMode==='retail'){
      const retailUnitTxt=Math.round(i.basePrice*1.15);
      const retailPricePart=(i.weightPerUnit&&i.weightPerUnit>0)?`$${retailUnitTxt}/kg`:`$${retailUnitTxt}`;
      t+=`🔸${i.name} ${qtyPart} ${retailPricePart} = ${amtStr}\n`;
    } else {
      const pricePart=(i.weightPerUnit&&i.weightPerUnit>0)?`$${i.basePrice}/kg`:`$${i.basePrice}`;
      t+=`🔸${i.name} ${qtyPart} ${pricePart} = ${amtStr}\n`;
    }
  });

  // 合計
  t+='\n';
  const shippingState=getShippingState();
  const shippingAmt=(shippingState==='added')?305:0;
  const grandTotal=total+shippingAmt;
  if(shippingState==='free'){
    t+=`共${total.toLocaleString()}元（總金額滿6000免運費）\n`;
  } else if(shippingState==='added'){
    t+=`商品小計 ${total.toLocaleString()}元\n`;
    t+=`運費 305元\n`;
    t+=`共${grandTotal.toLocaleString()}元\n`;
  } else {
    t+=`共${total.toLocaleString()}元\n`;
  }

  // 訂金
  const depRaw=grandTotal*0.7;
  const dep=Math.round(depRaw/500)*500;
  if(grandTotal>0){
    t+=`\n以上金額為預估報價，實際重量及金額以出貨單為準，差額將多退少補。\n`;
    t+=`訂金請匯 $${dep.toLocaleString()}\n`;
  }

  // 備註
  if(note) t+=`\n${note}\n`;

  // 注意事項
  if(document.getElementById('show-notes')?.checked){
    t+=`\n訂購與配送注意事項\n`;
    STD_NOTES.forEach(n=>t+=`✦ ${n}\n`);
  }

  // 匯款資訊
  t+=`\n${'─'.repeat(24)}\n`;
  t+=`銀行：${B.bank}\n`;
  if(B.branch)t+=`分行：${B.branch}\n`;
  t+=`帳號：${B.acct}\n戶名：${B.acctName}\n`;
  t+=`LINE@ ${B.line}\n`;

  return t;
}

async function runAI(){
  const key=document.getElementById('apikey').value.trim();
  if(!key){toast('請先輸入 Anthropic API Key');return;}
  if(!uploadedImg){toast('請先上傳報價單圖片');return;}
  setStatus('loading','AI 正在分析圖片…');
  document.getElementById('aibtn').disabled=true;
  try{
    const res=await fetch('https://api.anthropic.com/v1/messages',{
      method:'POST',
      headers:{'Content-Type':'application/json','x-api-key':key,'anthropic-version':'2023-06-01','anthropic-dangerous-direct-browser-access':'true'},
      body:JSON.stringify({
        model:'claude-opus-4-5-20251101',
        max_tokens:4096,
        messages:[{role:'user',content:[
          {type:'image',source:{type:'base64',media_type:uploadedImg.mediaType,data:uploadedImg.base64}},
          {type:'text',text:`請從這張報價單圖片中提取所有商品資訊。
規則：
- 以 Tab 分隔格式輸出每一行商品
- 格式：品名\t單位\t規格\t時價\t備註
- 若無規格或備註，該欄位留空（但 Tab 仍需保留）
- 時價若為空格、橫線、或「時價」文字，則輸出空字串
- 只輸出資料行，不要輸出標題行，不要輸出任何說明或 Markdown
- 若有到貨日期資訊，第一行加：DATE\t[日期，格式YYYY-MM-DD]

輸出範例：
DATE\t2025-04-30
鰺魚\tKG\t\t1360\t
白魚\t盒\t\t720\t`}
        ]}]
      })
    });
    if(!res.ok){const err=await res.json();throw new Error(err.error?.message||`HTTP ${res.status}`);}
    const data=await res.json();
    const text=data.content.map(c=>c.text||'').join('');
    const lines=text.trim().split('\n');
    let dateFound='',dataLines=[];
    lines.forEach(l=>{
      const cols=l.split('\t');
      if(cols[0].toUpperCase()==='DATE'&&cols[1])dateFound=cols[1].trim();
      else if(l.trim())dataLines.push(l);
    });
    if(dateFound){const idd2=document.getElementById('impdate');if(idd2)idd2.value=dateFound;}
    const ittv=document.getElementById('imptext');if(ittv)ittv.value=dataLines.join('\n');
    setStatus('ok',`解析完成，共 ${dataLines.length} 筆`);
    parseImp();
  }catch(e){
    setStatus('err','解析失敗：'+e.message);
  }finally{
    document.getElementById('aibtn').disabled=false;
  }
}
function parseImp(){
  const raw=document.getElementById('imptext').value.trim();
  parsedRows=[];
  if(!raw){
    const iprev2=document.getElementById('imppreview');if(iprev2)iprev2.innerHTML='<div style="text-align:center;padding:40px 20px;color:var(--muted);font-size:11px;font-family:var(--mono)">尚無解析資料</div>';
    document.getElementById('impconfirm').disabled=true;
    return;
  }
  const lines=raw.split('\n').filter(l=>l.trim());
  lines.forEach(line=>{
    const cols=line.split('\t');
    const name=(cols[0]||'').trim();if(!name)return;
    const unit=(cols[1]||'KG').trim()||'KG';
    const spec=(cols[2]||'').trim();
    const pRaw=(cols[3]||'').trim();
    const note=(cols[4]||'').trim();
    const price=pRaw!==''?parseFloat(pRaw):null;
    const match=db.products.find(p=>p.name===name);
    let status='new';
    if(match){const c=cur(match);status=(c.p!==price)?'update':'skip';}
    parsedRows.push({name,unit,spec,price,note,match,status});
  });
  const newC=parsedRows.filter(r=>r.status==='new').length;
  const updC=parsedRows.filter(r=>r.status==='update').length;
  const skipC=parsedRows.filter(r=>r.status==='skip').length;
  const iprev=document.getElementById('imppreview');if(iprev)iprev.innerHTML=`
    <div style="display:flex;gap:6px;margin-bottom:12px;flex-wrap:wrap">
      <span class="badge bg-green">新增 ${newC}</span>
      <span class="badge bg-blue">更新 ${updC}</span>
      <span class="badge bg-dim">不變 ${skipC}</span>
    </div>
    <div class="presult">
      ${parsedRows.map(r=>`<div class="prow ${r.status}">
        <span class="ptag ${r.status}">${r.status==='new'?'新增':r.status==='update'?'更新':'不變'}</span>
        <span class="pn">${r.name}${r.spec?`<span style="font-size:9px;color:var(--muted);margin-left:3px">${r.spec}</span>`:''}</span>
        <span style="font-size:10px;color:var(--muted)">${r.unit}</span>
        <span class="pp">${r.price!=null?'$'+r.price.toLocaleString():'時價'}</span>
        ${r.status==='update'&&r.match?`<span style="font-size:9px;color:var(--muted)">原$${cur(r.match).p||'—'}</span>`:''}
      </div>`).join('')}
    </div>`;
  document.getElementById('impconfirm').disabled=parsedRows.length===0;
}
function confirmImp(){
  if(!parsedRows.length)return;
  const date=document.getElementById('impdate').value;
  if(!date){toast('請選擇報價日期');return;}
  let newC=0,updC=0;
  parsedRows.forEach(r=>{
    if(r.status==='skip')return;
    if(r.status==='new'){db.products.push({id:genid(),name:r.name,unit:r.unit,spec:r.spec,cat:'冰鮮',h:[{d:date,p:r.price,n:r.note}]});newC++;}
    else if(r.status==='update'&&r.match){r.match.h.push({d:date,p:r.price,n:r.note});updC++;}
  });
  db.importLog=db.importLog||[];
  db.importLog.unshift({date,at:new Date().toISOString(),newC,updC,note:`匯入 ${parsedRows.length} 項（新增 ${newC}，更新 ${updC}）`});
  saveDB();clearImport();renderDB();renderCatSel();buildQCats();renderProds();renderImpLog();
  toast(`匯入完成：新增 ${newC}，更新 ${updC}`);
}
function clearImport(){
  const itv2=document.getElementById('imptext');if(itv2)itv2.value='';
  parsedRows=[];uploadedImg=null;
  const pr=document.getElementById('imgpreview');pr.src='';pr.classList.remove('on');
  document.getElementById('imppreview').innerHTML='<div style="text-align:center;padding:40px 20px;color:var(--muted);font-size:11px;font-family:var(--mono)">尚無解析資料</div>';
  document.getElementById('impconfirm').disabled=true;
  setStatus('','');
}

  if(!logs.length){c.innerHTML='<div style="text-align:center;padding:12px;color:var(--muted);font-size:11px;font-family:var(--mono)">尚無記錄</div>';return;}
  c.innerHTML=logs.map(l=>`<div class="logrec">

    <span class="logmsg">${l.note}</span>
    ${l.newC?`<span class="badge bg-green">${l.newC}新</span>`:''}
    ${l.updC?`<span class="badge bg-blue">${l.updC}更新</span>`:''}
  </div>`).join('');
}

  if(!grid)return;
  grid.innerHTML='';
  for(let i=0;i<firstDay;i++){
    const blank=document.createElement('div'); grid.appendChild(blank);
  }
  for(let d=1;d<=daysInMonth;d++){
    const date=new Date(calYear,calMonth,d);
    const dow=date.getDay();
    const isToday=date.getTime()===todayD.getTime();
    const isSel=calSelectedDate&&date.getTime()===calSelectedDate.getTime();
    const isPast=date<todayD;
    const el=document.createElement('div');
    el.textContent=d;
    const baseStyle='text-align:center;padding:5px 2px;border-radius:4px;font-size:13px;font-weight:500;transition:all .12s;';
    if(isPast){
      el.style.cssText=baseStyle+'opacity:.25;cursor:default;color:'+(dow===0?'#d94f4f':dow===6?'#4f7fe0':'#6a82a0')+';border:1px solid transparent;';
    } else {
      el.style.cssText=baseStyle+'cursor:pointer;color:'+(dow===0?'#d94f4f':dow===6?'#4f7fe0':'var(--text)')+';';
      if(isSel){
        el.style.background='var(--gold)'; el.style.color='#090d13'; el.style.border='1px solid var(--gold)';
      } else if(isToday){
        el.style.border='1px solid var(--gold)'; el.style.background='transparent';
      } else {
        el.style.border='1px solid transparent'; el.style.background='transparent';
        el.addEventListener('mouseover',function(){this.style.background='var(--s3)';this.style.border='1px solid var(--border2)';});
        el.addEventListener('mouseout',function(){this.style.background='transparent';this.style.border='1px solid transparent';});
      }
      (function(day){el.addEventListener('click',function(){calSelectDay(day);});})(d);
    }
    grid.appendChild(el);
  }
}

function calSelectDay(d){
  calSelectedDate = new Date(calYear, calMonth, d);
  renderCalMonth();
}

function confirmArrival(){
  if(!calSelectedDate){ document.getElementById('cal-popover').style.display='none'; return; }
  const m = calSelectedDate.getMonth()+1;
  const d = calSelectedDate.getDate();
  const dow = CAL_DAYS_ZH[calSelectedDate.getDay()];
  const timeVal = document.getElementById('cal-time').value;
  const timeStr = timeVal ? ' 到貨時間' + timeVal : '';
  window._arrivalText = `${m}/${d}（${dow}）${timeStr}`;
  const ad=document.getElementById('arrival-display');
  if(ad){ad.textContent='希望到貨日　'+window._arrivalText;ad.style.color='var(--gold)';}
  const cp=document.getElementById('cal-popover');
  if(cp)cp.style.display='none';
  renderQPreview();
}

function clearArrival(){
  calSelectedDate = null;
  window._arrivalText = '';
  const ad2=document.getElementById('arrival-display');
  if(ad2){ad2.textContent='希望到貨日　點擊選擇';ad2.style.color='var(--dim)';}
  const cp2=document.getElementById('cal-popover');
  if(cp2)cp2.style.display='none';
  renderQPreview();
}

function toggleMobPreview(){
  const section = document.getElementById('mob-preview-section');
  const btn = document.getElementById('mob-preview-toggle');
  const wrap = document.getElementById('mob-quote-card-inner');
  if(!section) return;
  const isOpen = section.style.display !== 'none';
  if(isOpen){
    section.style.display = 'none';
    if(btn) btn.textContent = '👁\u00A0\u00A0預覽報價單';
  } else {
    // Clone & render quote card
    renderQPreview();
    const src = document.getElementById('quote-card');
    if(src && wrap){
      const cl = src.cloneNode(true);
      cl.removeAttribute('id');
      cl.style.width = '100%';
      wrap.innerHTML = '';
      wrap.appendChild(cl);
    }
    section.style.display = 'block';
    if(btn) btn.textContent = '▲ 收起預覽';
    // Scroll to preview
    setTimeout(()=>section.scrollIntoView({behavior:'smooth', block:'start'}), 100);
  }
}

// ── TOAST ────────────────────────────────────────────────────
function toast(msg){
  const el=document.getElementById('toast');
  if(!el)return;el.textContent=msg;el.classList.add('on');
  clearTimeout(toastT);toastT=setTimeout(()=>el.classList.remove('on'),2200);
}

// ══ MOBILE ══════════════════════════════════════════════════
const isMob=()=>window.innerWidth<=768;
function applyMob(){
  const on=isMob();
  const b=document.getElementById('mob-cust-block');
  const f=document.getElementById('mob-fab');
  const tw=document.getElementById('mob-preview-toggle-wrap');
  if(b)b.style.display=on?'flex':'none';
  if(f)f.style.display=on?'flex':'none';
  if(tw)tw.style.display=on?'block':'none';
}
function syncMob(el,id){
  const t=document.getElementById(id);
  if(t)t.value=el.value;
  renderQPreview();
}
function updateMobArr(){
  const el=document.getElementById('mob-arr-disp');
  if(!el)return;
  el.textContent=window._arrivalText?('希望到貨日　'+window._arrivalText):'希望到貨日　點擊選擇';
  el.style.color=window._arrivalText?'var(--gold)':'var(--dim)';
}
const _ca=confirmArrival;
confirmArrival=function(){_ca();updateMobArr();};
const _cl=clearArrival;
clearArrival=function(){_cl();updateMobArr();};
function openMobPreview(){
  renderQPreview();
  const src=document.getElementById('quote-card');
  const wrap=document.getElementById('mob-card-wrap');
  if(!src||!wrap)return;
  const cl=src.cloneNode(true);cl.removeAttribute('id');cl.style.width='100%';cl.style.maxWidth='460px';
  if(!wrap)return;
  wrap.innerHTML='';wrap.appendChild(cl);
  const ov=document.getElementById('mob-ov');
  if(ov){ov.classList.add('on');document.body.style.overflow='hidden';}
}
function closeMobPreview(){
  const ov=document.getElementById('mob-ov');
  if(ov){ov.classList.remove('on');document.body.style.overflow='';}
}
window.addEventListener('resize',applyMob);
setTimeout(applyMob,80);
